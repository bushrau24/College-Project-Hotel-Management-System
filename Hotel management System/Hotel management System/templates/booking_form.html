{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-9">
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden mt-4">
            <div class="card-header border-0 py-4" style="background: linear-gradient(45deg, #424242, #616161);">
                <h4 class="mb-0 text-center text-white fw-bold"><i class="bi bi-pencil-square me-2"></i>{{ title }}</h4>
            </div>
            <div class="card-body p-5">
                <form method="post" enctype="multipart/form-data" class="needs-validation">
                    {% csrf_token %}

                    <div class="row g-4">
                        <div class="col-12">
                            <div class="p-4 bg-light rounded-3 border-start border-primary border-4 mb-3">
                                <h6 class="text-primary fw-bold mb-3"><i class="bi bi-info-circle me-2"></i>Room
                                    Identification & Pricing</h6>
                                <div class="row g-3">
                                    {{ form.as_p }}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex gap-2 mt-5">
                        <button type="submit" class="btn btn-primary py-3 px-5 rounded-3 fw-bold shadow-sm flex-grow-1">
                            <i class="bi bi-save me-2"></i>Save Room Details
                        </button>
                        <a href="{% url 'admin_dashboard' %}"
                            class="btn btn-light py-3 px-5 rounded-3 fw-bold border text-muted">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
    /* Improve Django form rendering */
    form p {
        margin-bottom: 1.5rem;
    }

    form label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: #495057;
        font-size: 0.9rem;
    }

    input[type="text"],
    input[type="number"],
    select,
    textarea,
    input[type="file"] {
        display: block;
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 1rem;
        color: #212529;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 0.5rem;
        transition: border-color .15s ease-in-out, box-shadow .15s ease-in-out;
    }

    input:focus,
    select:focus,
    textarea:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        outline: 0;
    }
</style>
{% endblock %}
